apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctfd
  namespace: ctfd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ctfd
  template:
    metadata:
      labels:
        app: ctfd
    spec:
      containers:
        - name: ctfd
          image: ctfd/ctfd:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ctfd-secrets
                  key: db-password
            - name: DATABASE_URL
              value: mysql+pymysql://ctfd:$(DB_PASSWORD)@ctfd-db/ctfd
            - name: REDIS_URL
              value: redis://ctfd-cache:6379
            - name: WORKERS
              value: "1"
            - name: REVERSE_PROXY
              value: "true"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ctfd-secrets
                  key: ctfd-secret-key
          volumeMounts:
            - name: uploads
              mountPath: /var/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ctfd-uploads
