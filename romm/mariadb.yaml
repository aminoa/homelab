apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm-db
  namespace: romm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: romm-db
  template:
    metadata:
      labels:
        app: romm-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: db-root-password
            - name: MARIADB_DATABASE
              value: romm
            - name: MARIADB_USER
              value: romm-user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: db-password
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: romm-db

---

apiVersion: v1
kind: Service
metadata:
  name: romm-db
  namespace: romm
spec:
  selector:
    app: romm-db
  ports:
    - port: 3306
      targetPort: 3306
