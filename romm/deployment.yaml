apiVersion: apps/v1
kind: Deployment
metadata:
  name: romm
  namespace: romm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: romm
  template:
    metadata:
      labels:
        app: romm
    spec:
      enableServiceLinks: false
      containers:
        - name: romm
          image: rommapp/romm:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: romm-db
            - name: DB_NAME
              value: romm
            - name: DB_USER
              value: romm-user
            - name: DB_PASSWD
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: db-password
            - name: ROMM_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: auth-secret
            - name: IGDB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: igdb-client-id
            - name: IGDB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: romm-secrets
                  key: igdb-client-secret
          volumeMounts:
            - name: library
              mountPath: /romm/library
            - name: config
              mountPath: /romm/config/config.yml
              subPath: config.yml
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: romm-library
        - name: config
          configMap:
            name: romm-config
