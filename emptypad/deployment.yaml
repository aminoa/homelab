apiVersion: apps/v1
kind: Deployment
metadata:
  name: emptypad
  namespace: emptypad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emptypad
  template:
    metadata:
      labels:
        app: emptypad
    spec:
      containers:
        - name: emptypad
          image: aminoa/emptypad:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
